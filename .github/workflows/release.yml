name: Release

# Publie une release GitHub quand un tag `v*` est poussé (ex: `v0.0.1`).
# Peut aussi être lancé manuellement en sélectionnant un tag existant
# (Actions → Release → Run workflow → choisir le tag).
#
# La release contient trois manières de récupérer Taffk :
#   - Installateur Windows   : `Taffk_<version>_x64-setup.exe` (NSIS)
#   - Exécutable portable    : `Taffk_<version>_x64_portable.exe` (sans installateur)
#   - Code source            : « Source code (zip / tar.gz) », ajouté par GitHub.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app & publish release (installateur + code source)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Taffk ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          # On ne produit que l'installateur NSIS (.exe). Le binaire portable
          # est ajouté à l'étape suivante, et GitHub joint le code source.
          args: --bundles nsis
          releaseBody: |
            ## Télécharger Taffk

            | Option | Fichier | Pour qui |
            | --- | --- | --- |
            | **Installateur** | `Taffk_*_x64-setup.exe` | Installation classique (raccourcis, désinstalleur). |
            | **Portable** | `Taffk_*_x64_portable.exe` | Aucun installateur : lancez le `.exe` directement, où vous voulez. |
            | **Code source** | *Source code* (zip / tar.gz) ci-dessous | Compiler vous-même. |

      - name: Stage portable executable
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          $dest = "Taffk_${version}_x64_portable.exe"
          Copy-Item 'src-tauri/target/release/taffk.exe' $dest
          "PORTABLE_EXE=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Attach portable executable to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.PORTABLE_EXE }}
          fail_on_unmatched_files: true
