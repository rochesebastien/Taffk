name: Release

# Publie une release GitHub quand un tag `v*` est poussé (ex: `v0.0.1`).
# Peut aussi être lancé manuellement (Actions → Release → Run workflow) :
# dans ce cas le tag est dérivé de la version dans `src-tauri/tauri.conf.json`
# (ex: version 0.0.1 → release `v0.0.1`), et tauri-action crée le tag.
#
# La release contient quatre manières de récupérer Taffk :
#   - Installateur Windows   : `Taffk_<version>_x64-setup.exe` (NSIS)
#   - Exécutable portable    : `Taffk_<version>_x64_portable.exe` (sans installateur)
#   - Image disque macOS     : `Taffk_<version>_universal.dmg` (Intel + Apple Silicon)
#   - Code source            : « Source code (zip / tar.gz) », ajouté par GitHub.
#
# Les deux jobs (Windows et macOS) publient dans la même release ;
# tauri-action fusionne aussi leurs plateformes dans `latest.json`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            # On ne produit que l'installateur NSIS (.exe). Le binaire portable
            # est ajouté à l'étape suivante, et GitHub joint le code source.
            args: --bundles nsis
          - platform: macos-latest
            # Binaire universel (Intel + Apple Silicon) ; le bundle `app` est
            # nécessaire pour les artefacts de mise à jour (.app.tar.gz + .sig).
            args: --target universal-apple-darwin --bundles app,dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Determine release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          else
            version=$(node -p "require('./src-tauri/tauri.conf.json').version")
            tag="v${version}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Cibles requises pour le binaire macOS universel ; sans effet ailleurs.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signe les artefacts de mise à jour (latest.json + .sig) pour
          # l'updater intégré (Paramètres → Mises à jour). La clé est générée
          # par `npm run tauri signer generate` ; sans ce secret, le build
          # échoue car `createUpdaterArtifacts` est activé. Le mot de passe
          # doit être celui choisi à la génération de la clé.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: Taffk ${{ steps.meta.outputs.tag }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            ## Télécharger Taffk

            | Option | Fichier | Pour qui |
            | --- | --- | --- |
            | **Installateur Windows** | `Taffk_*_x64-setup.exe` | Installation classique (raccourcis, désinstalleur). |
            | **Portable Windows** | `Taffk_*_x64_portable.exe` | Aucun installateur : lancez le `.exe` directement, où vous voulez. |
            | **macOS** | `Taffk_*_universal.dmg` | Intel et Apple Silicon. Ouvrez le `.dmg` et glissez Taffk où vous voulez. |
            | **Code source** | *Source code* (zip / tar.gz) ci-dessous | Compiler vous-même. |

            > **macOS** : l'application n'est pas notariée. Au premier lancement,
            > faites un clic droit → **Ouvrir** (ou `xattr -cr /Applications/Taffk.app`).

            La version installée peut se mettre à jour depuis l'application :
            **Paramètres → Mises à jour → Rechercher les mises à jour**.
            (Les fichiers `latest.json` et `*.sig` servent à cette mise à jour
            intégrée — pas besoin de les télécharger.)

      - name: Stage portable executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = '${{ steps.meta.outputs.tag }}' -replace '^v', ''
          $dest = "Taffk_${version}_x64_portable.exe"
          Copy-Item 'src-tauri/target/release/taffk.exe' $dest
          "PORTABLE_EXE=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Attach portable executable to the release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: ${{ env.PORTABLE_EXE }}
          fail_on_unmatched_files: true
